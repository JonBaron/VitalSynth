name: Deploy web client to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/VitalSynth.Core/**'
      - 'src/VitalSynth.Web/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish Blazor WASM
        run: |
          dotnet publish src/VitalSynth.Web/VitalSynth.Web.csproj \
            -c Release \
            -o publish

      - name: Rewrite base href for GitHub Pages
        run: |
          sed -i 's|<base href="/" />|<base href="/VitalSynth/" />|g' publish/wwwroot/index.html

      - name: Disable Jekyll (keep _framework folder)
        run: touch publish/wwwroot/.nojekyll

      - name: Add 404 fallback
        run: cp publish/wwwroot/index.html publish/wwwroot/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
